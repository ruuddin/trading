<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="${watchlist.name}">Watchlist</title>
</head>
<body>
  <h1 th:text="${watchlist.name}">Watchlist</h1>
  <a href="/">Back</a>

  <h2>Stocks</h2>
  <table>
    <thead><tr><th>Symbol</th><th>Price</th><th>Action</th></tr></thead>
    <tbody>
      <tr th:each="s : ${watchlist.stocks}">
        <td th:text="${s.symbol}"></td>
        <td th:text="${s.lastPrice}"></td>
        <td>
          <form th:action="@{'/watchlist/' + ${watchlist.id} + '/remove/' + ${s.id}}" method="post">
            <button type="submit">Remove</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>

  <h3>Add symbol</h3>
  <form th:action="@{'/watchlist/' + ${watchlist.id} + '/add'}" method="post" th:object="${newStock}">
    <input type="text" th:field="*{symbol}" placeholder="AAPL" />
    <button type="submit">Add</button>
  </form>

</body>
</html>
